name: build-vllm-sm120

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ds4-sm120-full

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: vllm-openai
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vllm-ds4-sm120:latest
          build-args: |
            torch_cuda_arch_list=12.0